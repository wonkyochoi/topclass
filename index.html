<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>최원교의 마음세우기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;          /* 진한 검정 텍스트 */
    --sub:#6b6b6b;          /* 회색 본문 */
    --line:#ececec;         /* 옅은 선 */
    --card:#f4f4f5;         /* 연회색 카드 */
    --card-hover:#ededee;
    --pill:#141414;         /* 검정 버튼 */
    --radius:20px;
    --radius-sm:14px;
    --max:1080px;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--ink);
    /* 파스텔 그라데이션 배경 (Creda 톤) */
    background:
      radial-gradient(1200px 600px at 85% -5%, #fce3ef 0%, rgba(252,227,239,0) 55%),
      radial-gradient(1000px 600px at -10% 5%, #fdf6dd 0%, rgba(253,246,221,0) 55%),
      radial-gradient(1100px 700px at 50% 110%, #ece4fb 0%, rgba(236,228,251,0) 55%),
      #fbfbfc;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 상단 네비 ── */
  header{
    position:sticky;top:0;z-index:50;
    backdrop-filter:saturate(160%) blur(12px);
    background:rgba(251,251,252,0.7);
    border-bottom:1px solid rgba(0,0,0,0.04);
  }
  .nav{
    max-width:var(--max);margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;letter-spacing:-0.3px;}
  .brand .dot{width:22px;height:22px;border-radius:50%;
    background:linear-gradient(135deg,#7c5cfc,#b18cff);box-shadow:0 4px 10px rgba(124,92,252,.35);}
  .nav .count{font-size:13px;color:var(--sub);font-weight:500;}

  /* ── 히어로 ── */
  .hero{max-width:var(--max);margin:0 auto;padding:72px 24px 40px;text-align:center;}
  .eyebrow{
    display:inline-block;font-size:13px;font-weight:500;color:var(--sub);
    background:rgba(255,255,255,.6);border:1px solid rgba(0,0,0,.05);
    padding:7px 16px;border-radius:999px;margin-bottom:26px;
  }
  .hero h1{font-size:clamp(34px,6vw,60px);font-weight:900;line-height:1.12;letter-spacing:-1.5px;}
  .hero p{margin:22px auto 0;max-width:560px;color:var(--sub);font-size:17px;line-height:1.7;}

  /* ── 검색 ── */
  .searchwrap{max-width:560px;margin:34px auto 0;position:relative;}
  .searchwrap input{
    width:100%;padding:16px 20px 16px 50px;font-size:15px;font-family:inherit;
    border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--ink);
    box-shadow:0 6px 24px rgba(0,0,0,.04);outline:none;transition:.2s;
  }
  .searchwrap input:focus{border-color:#cbb8ff;box-shadow:0 6px 28px rgba(124,92,252,.12);}
  .searchwrap svg{position:absolute;left:20px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--sub);}

  /* ── 배너 버튼 ── */
  .banner{
    display:inline-flex;align-items:center;gap:12px;margin:24px auto 0;
    padding:16px 28px;border-radius:999px;text-decoration:none;
    color:#fff;font-weight:700;font-size:16px;letter-spacing:-0.3px;
    background:linear-gradient(110deg,#7c5cfc 0%,#9d7bff 50%,#b18cff 100%);
    box-shadow:0 10px 30px rgba(124,92,252,.35);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .banner:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(124,92,252,.45);}
  .banner .gift{font-size:19px;line-height:1;}
  .banner .arrow{opacity:.85;font-weight:900;}
  @media(max-width:560px){ .banner{font-size:14px;padding:14px 22px;} }

  /* ── 그리드 ── */
  .grid{
    max-width:var(--max);margin:50px auto 90px;padding:0 24px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;
  }
  .card{
    background:var(--card);border-radius:var(--radius);padding:26px 24px;
    cursor:pointer;border:1px solid transparent;
    transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    display:flex;flex-direction:column;min-height:170px;
  }
  .card:hover{transform:translateY(-4px);background:#fff;box-shadow:0 14px 40px rgba(0,0,0,.07);}
  .card .no{font-size:13px;font-weight:700;color:#7c5cfc;margin-bottom:12px;}
  .card h3{font-size:18px;font-weight:700;line-height:1.4;letter-spacing:-0.4px;margin-bottom:10px;}
  .card .sum{font-size:14px;color:var(--sub);line-height:1.6;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .card .date{margin-top:auto;padding-top:16px;font-size:12px;color:#9a9a9a;font-weight:500;}

  .empty{grid-column:1/-1;text-align:center;color:var(--sub);padding:60px 0;font-size:15px;}

  /* ── 읽기 모달 ── */
  .overlay{
    position:fixed;inset:0;z-index:100;display:none;
    background:rgba(20,20,22,.45);backdrop-filter:blur(4px);
    align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;
  }
  .overlay.open{display:flex;}
  .reader{
    background:#fff;border-radius:24px;max-width:720px;width:100%;
    padding:48px 52px 56px;box-shadow:0 30px 80px rgba(0,0,0,.25);
    animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
  .reader .close{
    float:right;width:38px;height:38px;border:none;border-radius:50%;
    background:var(--card);cursor:pointer;font-size:18px;color:var(--ink);
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .reader .close:hover{background:#e4e4e6;}
  .reader .rno{font-size:13px;font-weight:700;color:#7c5cfc;margin-bottom:14px;}
  .reader h2{font-size:30px;font-weight:900;line-height:1.3;letter-spacing:-0.8px;margin-bottom:10px;}
  .reader .rdate{font-size:13px;color:#9a9a9a;margin-bottom:30px;}
  .reader .rbody{font-size:16.5px;line-height:1.95;color:#2a2a2a;white-space:pre-wrap;word-break:keep-all;}
  .reader .rbody p{margin-bottom:20px;}

  .navbtns{display:flex;justify-content:space-between;gap:12px;margin-top:44px;padding-top:26px;border-top:1px solid var(--line);}
  .navbtns button{
    flex:1;padding:14px;border:none;border-radius:999px;cursor:pointer;
    font-family:inherit;font-size:14px;font-weight:700;transition:.15s;
  }
  .btn-prev{background:var(--card);color:var(--ink);}
  .btn-prev:hover{background:#e4e4e6;}
  .btn-next{background:var(--pill);color:#fff;}
  .btn-next:hover{background:#000;}
  .navbtns button:disabled{opacity:.35;cursor:not-allowed;}

  footer{text-align:center;padding:40px 20px 60px;color:#a5a5a5;font-size:13px;}

  @media(max-width:560px){
    .reader{padding:36px 24px 40px;}
    .reader h2{font-size:24px;}
    .hero{padding:48px 20px 30px;}
  }
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="brand"><span class="dot"></span> 마음세우기</div>
    <span class="count" id="navCount"></span>
  </div>
</header>

<section class="hero">
  <span class="eyebrow">조선일보 톱클래스 · 칼럼 아카이브</span>
  <h1>최원교의<br>마음세우기</h1>
  <p>마음을 다스리고 바로 세우는 108편의 이야기.<br>읽고 싶은 글을 골라 천천히 마음을 들여다보세요.</p>
  <div class="searchwrap">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search" placeholder="제목이나 내용으로 검색하기">
  </div>
  <div>
    <a class="banner" href="https://blog.naver.com/cmass77/224072344328" target="_blank" rel="noopener">
      <span class="gift">🎁</span>
      얘비작가 선물세트 30종 무료다운 받기
      <span class="arrow">→</span>
    </a>
  </div>
</section>

<main class="grid" id="grid"></main>

<footer>최원교의 마음세우기 · 조선일보 톱클래스 토프</footer>

<!-- 읽기 모달 -->
<div class="overlay" id="overlay">
  <article class="reader">
    <button class="close" id="closeBtn" aria-label="닫기">✕</button>
    <div class="rno" id="rNo"></div>
    <h2 id="rTitle"></h2>
    <div class="rdate" id="rDate"></div>
    <div class="rbody" id="rBody"></div>
    <div class="navbtns">
      <button class="btn-prev" id="prevBtn">← 이전 글</button>
      <button class="btn-next" id="nextBtn">다음 글 →</button>
    </div>
  </article>
</div>

<script src="columns.js"></script>
<script>
  const grid = document.getElementById('grid');
  const overlay = document.getElementById('overlay');
  const search = document.getElementById('search');
  let current = 0;        // 현재 열린 칼럼의 columns 배열 인덱스
  let view = [];          // 현재 화면에 보이는 칼럼 목록

  document.getElementById('navCount').textContent = '총 ' + columns.length + '편';

  // 카드 렌더링
  function render(list){
    view = list;
    grid.innerHTML = '';
    if(list.length === 0){
      grid.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
      return;
    }
    list.forEach((c)=>{
      const idx = columns.indexOf(c);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<div class="no">No. ' + String(c.no).padStart(2,'0') + '</div>' +
        '<h3>' + escapeHtml(c.title) + '</h3>' +
        (c.summary ? '<div class="sum">' + escapeHtml(c.summary) + '</div>' : '') +
        (c.date ? '<div class="date">' + escapeHtml(c.date) + '</div>' : '<div class="date"></div>');
      card.onclick = ()=>{
        if(c.url){ window.open(c.url, '_blank', 'noopener'); }
        else { openReader(idx); }
      };
      grid.appendChild(card);
    });
  }

  // 모달 열기
  function openReader(idx){
    current = idx;
    const c = columns[idx];
    document.getElementById('rNo').textContent = 'No. ' + String(c.no).padStart(2,'0');
    document.getElementById('rTitle').textContent = c.title;
    document.getElementById('rDate').textContent = c.date || '';
    document.getElementById('rBody').textContent = c.body || '';
    document.getElementById('prevBtn').disabled = (idx === 0);
    document.getElementById('nextBtn').disabled = (idx === columns.length - 1);
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    overlay.scrollTop = 0;
  }
  function closeReader(){
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('closeBtn').onclick = closeReader;
  overlay.onclick = (e)=>{ if(e.target === overlay) closeReader(); };
  document.getElementById('prevBtn').onclick = ()=>{ if(current>0) openReader(current-1); };
  document.getElementById('nextBtn').onclick = ()=>{ if(current<columns.length-1) openReader(current+1); };
  document.addEventListener('keydown',(e)=>{
    if(!overlay.classList.contains('open')) return;
    if(e.key === 'Escape') closeReader();
    if(e.key === 'ArrowLeft' && current>0) openReader(current-1);
    if(e.key === 'ArrowRight' && current<columns.length-1) openReader(current+1);
  });

  // 검색
  search.addEventListener('input',()=>{
    const q = search.value.trim().toLowerCase();
    if(!q){ render(columns); return; }
    render(columns.filter(c=>
      (c.title||'').toLowerCase().includes(q) ||
      (c.summary||'').toLowerCase().includes(q) ||
      (c.body||'').toLowerCase().includes(q)
    ));
  });

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  render(columns);
</script>
</body>
</html>
